<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980"><defs><linearGradient id="prereqGrad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" style="stop-color:#374151;stop-opacity:1"/><stop offset="100%" style="stop-color:#4b5563;stop-opacity:1"/></linearGradient><linearGradient id="step1Grad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" style="stop-color:#1f2937;stop-opacity:1"/><stop offset="100%" style="stop-color:#374151;stop-opacity:1"/></linearGradient><linearGradient id="step2Grad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" style="stop-color:#111827;stop-opacity:1"/><stop offset="100%" style="stop-color:#1f2937;stop-opacity:1"/></linearGradient><linearGradient id="step3Grad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" style="stop-color:#1f2937;stop-opacity:1"/><stop offset="100%" style="stop-color:#374151;stop-opacity:1"/></linearGradient><linearGradient id="step4Grad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" style="stop-color:#374151;stop-opacity:1"/><stop offset="100%" style="stop-color:#4b5563;stop-opacity:1"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="2" dy="2" flood-opacity=".15" stdDeviation="3"/></filter><style>.title{font-family:&apos;Inter&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;font-size:28px;font-weight:600;fill:#111827;letter-spacing:-.5px}.subtitle{font-size:14px;fill:#6b7280;letter-spacing:2px;text-transform:uppercase}.box-text,.box-title,.subtitle{font-family:&apos;Inter&apos;,&apos;Segoe UI&apos;,Arial,sans-serif}.box-title{font-size:16px;font-weight:600;fill:#f9fafb;letter-spacing:.5px}.box-text{font-size:12px;fill:#e5e7eb}.output-text{font-family:&apos;JetBrains Mono&apos;,&apos;Courier New&apos;,monospace;font-size:11px;fill:#374151}.arrow-text{font-size:11px;fill:#9ca3af;font-weight:500}.agent-text,.arrow-text,.gate-text,.step-number{font-family:&apos;Inter&apos;,&apos;Segoe UI&apos;,Arial,sans-serif}.step-number{font-size:11px;font-weight:600;fill:#9ca3af}.agent-text,.gate-text{font-size:10px}.gate-text{font-weight:600;fill:#374151;text-transform:uppercase;letter-spacing:.5px}.agent-text{fill:#9ca3af}.clickable{cursor:pointer;transition:all .2s ease}.clickable:hover{filter:brightness(1.15)}</style></defs><rect width="900" height="980" fill="#fafafa"/><text x="450" y="40" class="title" text-anchor="middle">RPI Workflow</text><text x="450" y="60" class="subtitle" text-anchor="middle">Research → Plan → Implement</text><g class="clickable" transform="translate(100, 80)"><rect width="700" height="115" fill="url(#prereqGrad)" filter="url(#shadow)" rx="8"/><rect width="700" height="36" fill="rgba(0,0,0,0.2)" rx="8"/><rect width="700" height="8" y="28" fill="rgba(0,0,0,0.2)"/><text x="24" y="24" class="box-title">PREREQUISITES</text><g><text x="0" y="12" class="step-number" transform="translate(24, 50)">01</text><text x="28" y="12" class="box-text" transform="translate(24, 50)">Create constitution.md at project root</text></g><g><text x="0" y="12" class="step-number" transform="translate(24, 72)">02</text><text x="28" y="12" class="box-text" transform="translate(24, 72)">Add { &quot;plansDirectory&quot;: &quot;./rpi/plans&quot; } to .claude/settings.json</text></g><g><text x="0" y="12" class="step-number" transform="translate(24, 94)">03</text><text x="28" y="12" class="box-text" transform="translate(24, 94)">Create rpi/plans directory</text></g></g><g transform="translate(450, 198)"><line x1="0" x2="0" y1="0" y2="10" stroke="#d1d5db" stroke-width="2"/><polygon fill="#d1d5db" points="0 16 -5 8 5 8"/></g><g class="clickable" transform="translate(100, 218)"><rect width="700" height="175" fill="url(#step1Grad)" filter="url(#shadow)" rx="8"/><rect width="700" height="36" fill="rgba(0,0,0,0.3)" rx="8"/><rect width="700" height="8" y="28" fill="rgba(0,0,0,0.3)"/><text x="24" y="24" class="box-title">STEP 1 — DESCRIBE</text><g><text x="0" y="12" class="step-number" transform="translate(24, 50)">01</text><text x="28" y="12" class="box-text" transform="translate(24, 50)">Open Claude Code in plan mode and describe your feature</text></g><rect width="300" height="24" x="24" y="70" fill="#f3f4f6" rx="4"/><text x="34" y="86" class="output-text">→ Output: rpi/plans/{plan}.md</text><g><text x="0" y="12" class="step-number" transform="translate(24, 105)">02</text><text x="28" y="12" class="box-text" transform="translate(24, 105)">Create a feature folder inside rpi/ with your feature name</text></g><g><text x="0" y="12" class="step-number" transform="translate(24, 127)">03</text><text x="28" y="12" class="box-text" transform="translate(24, 127)">Copy the plan into the feature folder and rename to REQUEST.md</text></g><rect width="340" height="24" x="24" y="148" fill="#f3f4f6" rx="4"/><text x="34" y="164" class="output-text">→ Final: rpi/{feature-slug}/REQUEST.md</text></g><g transform="translate(450, 396)"><line x1="0" x2="0" y1="0" y2="10" stroke="#d1d5db" stroke-width="2"/><polygon fill="#d1d5db" points="0 16 -5 8 5 8"/></g><g class="clickable" transform="translate(100, 416)"><rect width="700" height="130" fill="url(#step2Grad)" filter="url(#shadow)" rx="8"/><rect width="700" height="36" fill="rgba(255,255,255,0.08)" rx="8"/><rect width="700" height="8" y="28" fill="rgba(255,255,255,0.08)"/><text x="24" y="24" class="box-title">STEP 2 — RESEARCH</text><rect width="100" height="20" x="580" y="8" fill="#fbbf24" rx="10"/><text x="630" y="22" class="gate-text" text-anchor="middle">GO / NO-GO</text><rect width="420" height="26" x="24" y="48" fill="rgba(255,255,255,0.1)" rx="4"/><text x="34" y="66" class="box-text" style="font-family:'JetBrains Mono',monospace;font-size:11px">/rpi:research rpi/{feature-slug}/REQUEST.md</text><rect width="400" height="24" x="24" y="82" fill="#f3f4f6" rx="4"/><text x="34" y="98" class="output-text">→ Output: rpi/{feature-slug}/research/RESEARCH.md</text><text x="460" y="62" class="agent-text">Agents: requirement-parser, product-manager,</text><text x="460" y="76" class="agent-text">Explore, senior-software-engineer,</text><text x="460" y="90" class="agent-text">technical-cto-advisor, documentation-analyst-writer</text></g><g transform="translate(450, 549)"><line x1="0" x2="0" y1="0" y2="10" stroke="#d1d5db" stroke-width="2"/><polygon fill="#d1d5db" points="0 16 -5 8 5 8"/><text x="15" y="12" class="arrow-text">if GO</text></g><g class="clickable" transform="translate(100, 569)"><rect width="700" height="120" fill="url(#step3Grad)" filter="url(#shadow)" rx="8"/><rect width="700" height="36" fill="rgba(0,0,0,0.2)" rx="8"/><rect width="700" height="8" y="28" fill="rgba(0,0,0,0.2)"/><text x="24" y="24" class="box-title">STEP 3 — PLAN</text><rect width="260" height="26" x="24" y="48" fill="rgba(255,255,255,0.1)" rx="4"/><text x="34" y="66" class="box-text" style="font-family:'JetBrains Mono',monospace;font-size:11px">/rpi:plan &quot;{feature-slug}&quot;</text><rect width="500" height="24" x="24" y="82" fill="#f3f4f6" rx="4"/><text x="34" y="98" class="output-text">→ Output: rpi/{feature-slug}/plan/ [pm.md, ux.md, eng.md, PLAN.md]</text><text x="310" y="66" class="agent-text">Agents: senior-software-engineer, product-manager, ux-designer</text></g><g transform="translate(450, 692)"><line x1="0" x2="0" y1="0" y2="10" stroke="#d1d5db" stroke-width="2"/><polygon fill="#d1d5db" points="0 16 -5 8 5 8"/></g><g class="clickable" transform="translate(100, 712)"><rect width="700" height="170" fill="url(#step4Grad)" filter="url(#shadow)" rx="8"/><rect width="700" height="36" fill="rgba(0,0,0,0.2)" rx="8"/><rect width="700" height="8" y="28" fill="rgba(0,0,0,0.2)"/><text x="24" y="24" class="box-title">STEP 4 — IMPLEMENT</text><rect width="150" height="20" x="530" y="8" fill="#10b981" rx="10"/><text x="605" y="22" class="gate-text" text-anchor="middle" style="fill:#fff">PER-PHASE VALIDATION</text><rect width="300" height="26" x="24" y="48" fill="rgba(255,255,255,0.1)" rx="4"/><text x="34" y="66" class="box-text" style="font-family:'JetBrains Mono',monospace;font-size:11px">/rpi:implement &quot;{feature-slug}&quot;</text><rect width="652" height="50" x="24" y="82" fill="rgba(0,0,0,0.15)" rx="4"/><text x="34" y="100" class="box-text" style="font-size:11px;font-weight:500">Phase Loop:</text><text x="110" y="100" class="agent-text">Discovery → Implementation → Self-Validation → Code Review → User Validation → Docs</text><text x="34" y="120" class="agent-text">Status: [ ] Not Started [~] In Progress [x] PASS [!] Conditional [-] Failed</text><text x="350" y="66" class="agent-text">Agents: Explore, senior-software-engineer, code-reviewer</text><rect width="350" height="22" x="24" y="140" fill="#f3f4f6" rx="4"/><text x="34" y="155" class="output-text">→ Output: rpi/{feature-slug}/implement/IMPLEMENT.md</text></g><g transform="translate(450, 885)"><line x1="0" x2="0" y1="0" y2="10" stroke="#d1d5db" stroke-width="2"/><polygon fill="#d1d5db" points="0 16 -5 8 5 8"/></g><g transform="translate(100, 905)"><rect width="700" height="45" fill="#111827" filter="url(#shadow)" rx="8"/><text x="350" y="28" class="box-text" text-anchor="middle" style="font-size:13px;font-weight:500">✓ Feature Complete — Working Code + Documentation → Ready for PR</text></g></svg>