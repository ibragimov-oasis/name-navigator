<svg xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" viewBox="0 0 1100 620"><rect width="1100" height="620" fill="#fff" rx="8"/><text x="550" y="38" fill="#1a1a1a" font-size="22" font-weight="700" text-anchor="middle">Programmatic Tool Calling (PTC)</text><text x="550" y="58" fill="#888" font-size="13" text-anchor="middle">Claude Opus 4.6 / Sonnet 4.6 — Now Generally Available</text><line x1="550" x2="550" y1="75" y2="600" stroke="#d0d0d0" stroke-dasharray="6 4" stroke-width="1.5"/><text x="275" y="95" fill="#444" font-size="16" font-weight="600" text-anchor="middle">Traditional Tool Calling</text><text x="275" y="113" fill="#999" font-size="12" text-anchor="middle">3 tools = 3 inference passes</text><rect width="110" height="40" x="60" y="135" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" rx="6"/><text x="115" y="160" fill="#E65100" font-size="13" font-weight="600" text-anchor="middle">Claude</text><line x1="170" x2="280" y1="148" y2="148" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/><text x="225" y="142" fill="#E53935" font-size="10" text-anchor="middle">Tool call 1</text><rect width="110" height="40" x="280" y="135" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5" rx="6"/><text x="335" y="160" fill="#B71C1C" font-size="13" font-weight="600" text-anchor="middle">Action</text><line x1="280" x2="170" y1="168" y2="168" stroke="#43A047" stroke-width="1.5" marker-end="url(#arrowGreen)"/><text x="225" y="182" fill="#43A047" font-size="10" text-anchor="middle">Response 1</text><rect width="110" height="40" x="60" y="210" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" rx="6"/><text x="115" y="235" fill="#E65100" font-size="13" font-weight="600" text-anchor="middle">Claude</text><line x1="170" x2="280" y1="223" y2="223" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/><text x="225" y="217" fill="#E53935" font-size="10" text-anchor="middle">Tool call 2</text><rect width="110" height="40" x="280" y="210" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5" rx="6"/><text x="335" y="235" fill="#1B5E20" font-size="13" font-weight="600" text-anchor="middle">Action</text><line x1="280" x2="170" y1="243" y2="243" stroke="#43A047" stroke-width="1.5" marker-end="url(#arrowGreen)"/><text x="225" y="257" fill="#43A047" font-size="10" text-anchor="middle">Response 2</text><rect width="110" height="40" x="60" y="285" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" rx="6"/><text x="115" y="310" fill="#E65100" font-size="13" font-weight="600" text-anchor="middle">Claude</text><line x1="170" x2="280" y1="298" y2="298" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/><text x="225" y="292" fill="#E53935" font-size="10" text-anchor="middle">Tool call 3</text><rect width="110" height="40" x="280" y="285" fill="#BBDEFB" stroke="#1E88E5" stroke-width="1.5" rx="6"/><text x="335" y="310" fill="#0D47A1" font-size="13" font-weight="600" text-anchor="middle">Action</text><line x1="280" x2="170" y1="318" y2="318" stroke="#43A047" stroke-width="1.5" marker-end="url(#arrowGreen)"/><text x="225" y="332" fill="#43A047" font-size="10" text-anchor="middle">Response 3</text><rect width="110" height="40" x="60" y="360" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" rx="6"/><text x="115" y="385" fill="#E65100" font-size="13" font-weight="600" text-anchor="middle">Claude</text><line x1="170" x2="250" y1="380" y2="380" stroke="#F57C00" stroke-width="1.5" marker-end="url(#arrowOrange)"/><rect width="140" height="40" x="250" y="360" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1.5" rx="6"/><text x="320" y="385" fill="#424242" font-size="13" font-weight="600" text-anchor="middle">Final Answer</text><rect width="290" height="55" x="85" y="425" fill="#FFF8E1" stroke="#FFC107" stroke-width="1" rx="6"/><text x="230" y="447" fill="#F57F17" font-size="12" font-weight="600" text-anchor="middle">Token Cost: HIGH</text><text x="230" y="465" fill="#795548" font-size="11" text-anchor="middle">All 3 responses enter context window</text><text x="825" y="95" fill="#444" font-size="16" font-weight="600" text-anchor="middle">Programmatic Tool Calling</text><text x="825" y="113" fill="#999" font-size="12" text-anchor="middle">3 tools = 1 inference pass</text><rect width="110" height="50" x="590" y="145" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" rx="6"/><text x="645" y="175" fill="#E65100" font-size="13" font-weight="600" text-anchor="middle">Claude</text><line x1="700" x2="780" y1="170" y2="170" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrowBlue)"/><text x="740" y="163" fill="#1565C0" font-size="10" text-anchor="middle">Bash(..)</text><rect width="260" height="260" x="780" y="130" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1.5" rx="8"/><text x="910" y="155" fill="#424242" font-size="14" font-weight="700" text-anchor="middle">Python Script</text><line x1="795" x2="1025" y1="165" y2="165" stroke="#BDBDBD" stroke-width="1"/><rect width="210" height="30" x="805" y="180" fill="#FFCDD2" stroke="#E53935" stroke-width="1" rx="4"/><text x="910" y="200" fill="#B71C1C" font-size="11" font-weight="500" text-anchor="middle">await query_database(sql_1)</text><rect width="210" height="30" x="805" y="220" fill="#C8E6C9" stroke="#43A047" stroke-width="1" rx="4"/><text x="910" y="240" fill="#1B5E20" font-size="11" font-weight="500" text-anchor="middle">await query_database(sql_2)</text><rect width="210" height="30" x="805" y="260" fill="#BBDEFB" stroke="#1E88E5" stroke-width="1" rx="4"/><text x="910" y="280" fill="#0D47A1" font-size="11" font-weight="500" text-anchor="middle">await query_database(sql_3)</text><rect width="210" height="30" x="805" y="305" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1" rx="4"/><text x="910" y="325" fill="#283593" font-size="11" font-weight="500" text-anchor="middle">filter + aggregate results</text><rect width="210" height="30" x="805" y="345" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1" rx="4"/><text x="910" y="365" fill="#4527A0" font-size="11" font-weight="500" text-anchor="middle">print(summary)</text><line x1="780" x2="700" y1="350" y2="350" stroke="#43A047" stroke-width="2" marker-end="url(#arrowGreen)"/><text x="740" y="340" fill="#43A047" font-size="10" font-weight="600" text-anchor="middle">stdout only</text><rect width="110" height="50" x="590" y="330" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5" rx="6"/><text x="645" y="360" fill="#E65100" font-size="13" font-weight="600" text-anchor="middle">Claude</text><line x1="645" x2="645" y1="380" y2="410" stroke="#F57C00" stroke-width="1.5" marker-end="url(#arrowOrange)"/><rect width="140" height="40" x="575" y="410" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1.5" rx="6"/><text x="645" y="435" fill="#424242" font-size="13" font-weight="600" text-anchor="middle">Final Answer</text><rect width="455" height="55" x="585" y="475" fill="#E8F5E9" stroke="#43A047" stroke-width="1" rx="6"/><text x="812" y="497" fill="#2E7D32" font-size="12" font-weight="600" text-anchor="middle">Token Cost: ~37% LOWER</text><text x="812" y="515" fill="#795548" font-size="11" text-anchor="middle">Only stdout summary enters context — raw tool results stay in sandbox</text><rect width="1040" height="50" x="30" y="550" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" rx="6"/><text x="550" y="572" fill="#0D47A1" font-size="13" font-weight="600" text-anchor="middle">Key: Claude pre-bakes decision paths in code. Tool results go to the script, not the context window.</text><text x="550" y="590" fill="#1565C0" font-size="12" text-anchor="middle">Intermediate data is processed programmatically — only the final summary reaches Claude.</text><defs><marker id="arrowRed" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><polygon fill="#E53935" points="0 0 8 3 0 6"/></marker><marker id="arrowGreen" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><polygon fill="#43A047" points="0 0 8 3 0 6"/></marker><marker id="arrowBlue" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><polygon fill="#1565C0" points="0 0 8 3 0 6"/></marker><marker id="arrowOrange" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><polygon fill="#F57C00" points="0 0 8 3 0 6"/></marker></defs></svg>