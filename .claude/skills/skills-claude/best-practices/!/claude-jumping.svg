<svg xmlns="http://www.w3.org/2000/svg" width="140" height="126" viewBox="0 0 100 90"><style>@keyframes jump{0%{transform:translateY(0) scaleY(1) scaleX(1)}30%{transform:translateY(-16px) scaleY(1.1) scaleX(.95)}50%{transform:translateY(-18px) scaleY(1.05) scaleX(.98)}80%{transform:translateY(-5px) scaleY(.95) scaleX(1.05)}}@keyframes shadow-scale{0%{transform:scaleX(1);opacity:.25}50%{transform:scaleX(.4);opacity:.08}}@keyframes wave-left{0%{transform:rotate(0deg)}50%{transform:rotate(-25deg)}}@keyframes wave-right{0%{transform:rotate(0deg)}50%{transform:rotate(25deg)}}@keyframes ear-bounce{0%{transform:scaleY(1)}40%{transform:scaleY(1.2)}60%{transform:scaleY(.85)}}.claude-body{animation:jump .5s ease-in-out infinite;transform-origin:center bottom}.shadow{animation:shadow-scale .5s ease-in-out infinite}.left-arm{animation:wave-left .5s ease-in-out infinite;transform-origin:right center}.right-arm{animation:wave-right .5s ease-in-out infinite;transform-origin:left center}.left-ear,.right-ear{animation:ear-bounce .5s ease-in-out infinite;transform-origin:center bottom}.right-ear{animation:ear-bounce .5s ease-in-out infinite .1s}</style><ellipse cx="50" cy="82" fill="#000" class="shadow" rx="22" ry="5"/><g class="claude-body"><rect width="8" height="14" x="22" y="10" fill="#E07C4C" class="left-ear"/><rect width="8" height="14" x="70" y="10" fill="#E07C4C" class="right-ear"/><rect width="64" height="4" x="18" y="24" fill="#E07C4C"/><rect width="72" height="32" x="14" y="28" fill="#E07C4C"/><rect width="8" height="10" x="30" y="34" fill="#000"/><rect width="8" height="10" x="62" y="34" fill="#000"/><rect width="12" height="8" x="2" y="36" fill="#E07C4C" class="left-arm"/><rect width="12" height="8" x="86" y="36" fill="#E07C4C" class="right-arm"/><rect width="12" height="14" x="24" y="60" fill="#E07C4C"/><rect width="12" height="14" x="64" y="60" fill="#E07C4C"/></g></svg>