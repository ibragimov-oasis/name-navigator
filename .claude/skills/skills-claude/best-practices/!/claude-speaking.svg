<svg xmlns="http://www.w3.org/2000/svg" width="196" height="126" viewBox="0 0 140 90"><style>@keyframes bob{0%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes shadow-pulse{0%{transform:scaleX(1);opacity:.25}50%{transform:scaleX(.9);opacity:.2}}@keyframes talk{0%{transform:scaleY(1)}50%{transform:scaleY(.5)}}@keyframes ear-tilt-left{0%{transform:rotate(0deg)}50%{transform:rotate(-5deg)}}@keyframes ear-tilt-right{0%{transform:rotate(0deg)}50%{transform:rotate(5deg)}}@keyframes wave-expand{0%{opacity:.8;transform:scaleX(.3) scaleY(.8)}}@keyframes float-note-1{0%{opacity:1;transform:translate(0,0) rotate(0deg)}}@keyframes float-note-2{0%{opacity:1;transform:translate(0,0) rotate(0deg)}}@keyframes float-note-3{0%{opacity:1;transform:translate(0,0) rotate(0deg)}}.claude-body{animation:bob .8s ease-in-out infinite;transform-origin:center bottom}.shadow{animation:shadow-pulse .8s ease-in-out infinite}.mouth{animation:talk .3s ease-in-out infinite;transform-origin:center center}.left-ear,.right-ear{animation:ear-tilt-left .8s ease-in-out infinite;transform-origin:center bottom}.right-ear{animation:ear-tilt-right .8s ease-in-out infinite}.wave-1{animation:wave-expand .8s ease-out infinite}.wave-1,.wave-2,.wave-3{transform-origin:left center}.wave-2{animation:wave-expand .8s ease-out infinite .2s}.wave-3{animation:wave-expand .8s ease-out infinite .4s}.note-1{animation:float-note-1 1.5s ease-out infinite}.note-2{animation:float-note-2 1.5s ease-out infinite .3s}.note-3{animation:float-note-3 1.5s ease-out infinite .6s}</style><ellipse cx="50" cy="82" fill="#000" class="shadow" rx="22" ry="5"/><g class="wave-1"><path fill="none" stroke="#E07C4C" stroke-linecap="round" stroke-width="3" d="M 92 44 Q 100 44, 100 52 Q 100 60, 92 60"/></g><g class="wave-2"><path fill="none" stroke="#E07C4C" stroke-linecap="round" stroke-width="3" d="M 96 38 Q 108 38, 108 52 Q 108 66, 96 66"/></g><g class="wave-3"><path fill="none" stroke="#E07C4C" stroke-linecap="round" stroke-width="3" d="M 100 32 Q 116 32, 116 52 Q 116 72, 100 72"/></g><g class="note-1"><ellipse cx="108" cy="28" fill="#E07C4C" rx="4" ry="3" transform="rotate(-20, 108, 28)"/><rect width="2" height="16" x="111" y="12" fill="#E07C4C"/><path fill="#E07C4C" d="M 113 12 Q 118 14, 118 18 Q 118 22, 113 20"/></g><g class="note-2"><ellipse cx="122" cy="22" fill="#E07C4C" rx="4" ry="3" transform="rotate(-20, 122, 22)"/><rect width="2" height="16" x="125" y="6" fill="#E07C4C"/></g><g class="note-3"><ellipse cx="115" cy="42" fill="#E07C4C" rx="3" ry="2.5" transform="rotate(-20, 115, 42)"/><ellipse cx="125" cy="40" fill="#E07C4C" rx="3" ry="2.5" transform="rotate(-20, 125, 40)"/><rect width="2" height="16" x="117" y="26" fill="#E07C4C"/><rect width="2" height="16" x="127" y="24" fill="#E07C4C"/><rect width="12" height="2" x="117" y="26" fill="#E07C4C"/></g><g class="claude-body"><rect width="8" height="14" x="22" y="10" fill="#E07C4C" class="left-ear"/><rect width="8" height="14" x="70" y="10" fill="#E07C4C" class="right-ear"/><rect width="64" height="4" x="18" y="24" fill="#E07C4C"/><rect width="72" height="32" x="14" y="28" fill="#E07C4C"/><rect width="8" height="10" x="30" y="34" fill="#000"/><rect width="8" height="10" x="62" y="34" fill="#000"/><rect width="12" height="6" x="44" y="50" fill="#000" class="mouth"/><rect width="12" height="8" x="2" y="40" fill="#E07C4C"/><rect width="12" height="8" x="86" y="40" fill="#E07C4C"/><rect width="12" height="14" x="24" y="60" fill="#E07C4C"/><rect width="12" height="14" x="64" y="60" fill="#E07C4C"/></g></svg>