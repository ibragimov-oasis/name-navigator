<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" style="font-family:system-ui,-apple-system,sans-serif"><defs><linearGradient id="cliGradient" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#667eea"/><stop offset="100%" style="stop-color:#764ba2"/></linearGradient><linearGradient id="sdkGradient" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#34d399"/><stop offset="100%" style="stop-color:#059669"/></linearGradient><linearGradient id="questionGradient" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#4facfe"/><stop offset="100%" style="stop-color:#00f2fe"/></linearGradient><linearGradient id="claudeGradient" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#d4a574"/><stop offset="100%" style="stop-color:#c4956a"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="2" dy="4" flood-opacity=".15" stdDeviation="4"/></filter><filter id="glow"><feGaussianBlur result="coloredBlur" stdDeviation="3"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrowheadCli" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#667eea" points="0 0 10 3.5 0 7"/></marker><marker id="arrowheadSdk" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#059669" points="0 0 10 3.5 0 7"/></marker></defs><rect width="900" height="580" fill="#f8fafc" rx="12"/><text x="450" y="35" fill="#1e293b" font-size="18" font-weight="700" text-anchor="middle">Same Question, Different Paths: Why Outputs May Vary</text><g filter="url(#shadow)"><rect width="350" height="70" x="275" y="55" fill="url(#questionGradient)" rx="12"/><text x="450" y="82" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">USER QUESTION</text><text x="450" y="105" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">&quot;What is the capital of Norway?&quot;</text></g><path fill="none" stroke="#667eea" stroke-width="3" marker-end="url(#arrowheadCli)" d="M 370 125 L 370 145 L 200 145 L 200 165"/><path fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrowheadSdk)" d="M 530 125 L 530 145 L 700 145 L 700 165"/><g filter="url(#shadow)"><rect width="300" height="50" x="50" y="170" fill="url(#cliGradient)" rx="10"/><text x="200" y="200" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Claude CLI (Claude Code)</text></g><g filter="url(#shadow)"><rect width="300" height="145" x="50" y="235" fill="#fff" stroke="#667eea" stroke-width="2" rx="10"/><text x="200" y="258" fill="#667eea" font-size="12" font-weight="700" text-anchor="middle">SYSTEM PROMPT (modular, ~269+ base)</text><line x1="70" x2="330" y1="270" y2="270" stroke="#e2e8f0" stroke-width="1"/><text x="75" y="290" fill="#475569" font-size="10">+ 18+ Tool Instructions (Write, Read, Bash...)</text><text x="75" y="308" fill="#475569" font-size="10">+ Coding Guidelines &amp; Style Rules</text><text x="75" y="326" fill="#475569" font-size="10">+ Security &amp; Injection Defense</text><text x="75" y="344" fill="#475569" font-size="10">+ CLAUDE.md Project Context</text><text x="75" y="362" fill="#475569" font-size="10">+ Environment (OS, Git, Directory)</text></g><g filter="url(#shadow)"><rect width="300" height="50" x="550" y="170" fill="url(#sdkGradient)" rx="10"/><text x="700" y="200" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Claude Agent SDK</text></g><g filter="url(#shadow)"><rect width="300" height="145" x="550" y="235" fill="#fff" stroke="#059669" stroke-width="2" rx="10"/><text x="700" y="258" fill="#059669" font-size="12" font-weight="700" text-anchor="middle">SYSTEM PROMPT (minimal default)</text><line x1="570" x2="830" y1="270" y2="270" stroke="#e2e8f0" stroke-width="1"/><text x="575" y="290" fill="#475569" font-size="10">+ Minimal Tool Instructions</text><text x="575" y="308" fill="#475569" font-size="10">+ Basic Safety Rules</text><text x="575" y="326" fill="#94a3b8" font-size="10" font-style="italic">− No Coding Guidelines</text><text x="575" y="344" fill="#94a3b8" font-size="10" font-style="italic">− No Project Context</text><text x="575" y="362" fill="#94a3b8" font-size="10" font-style="italic">− No Environment Info</text></g><path fill="none" stroke="#667eea" stroke-width="2" marker-end="url(#arrowheadCli)" d="M 200 380 L 200 400 L 450 400 L 450 420"/><path fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrowheadSdk)" d="M 700 380 L 700 400 L 450 400 L 450 420"/><g filter="url(#shadow)"><rect width="250" height="55" x="325" y="420" fill="url(#claudeGradient)" rx="12"/><text x="450" y="445" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">CLAUDE MODEL</text><text x="450" y="463" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Claude Opus 4.5</text></g><g filter="url(#shadow)"><rect width="650" height="75" x="125" y="495" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="12"/><text x="450" y="518" fill="#dc2626" font-size="13" font-weight="700" text-anchor="middle">⚠ NO GUARANTEE OF IDENTICAL OUTPUT</text><text x="450" y="538" fill="#7f1d1d" font-size="10" text-anchor="middle">Even with matching prompts + temperature=0, outputs may differ due to:</text><text x="450" y="556" fill="#991b1b" font-size="10" font-weight="600" text-anchor="middle">No Seed Parameter · MoE Routing · Floating-Point Variance · Infrastructure Non-Determinism</text></g><g><rect width="110" height="22" x="75" y="385" fill="#667eea" rx="11"/><text x="130" y="400" fill="#fff" font-size="9" font-weight="600" text-anchor="middle">~269+ base tokens</text></g><g><rect width="100" height="22" x="715" y="385" fill="#059669" rx="11"/><text x="765" y="400" fill="#fff" font-size="9" font-weight="600" text-anchor="middle">minimal default</text></g><circle cx="450" cy="305" r="22" fill="#1e293b"/><text x="450" y="310" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">VS</text><g transform="translate(50, 495)"><text x="0" y="0" fill="#64748b" font-size="9" font-weight="600">LEGEND:</text><rect width="12" height="12" x="0" y="8" fill="url(#cliGradient)" rx="2"/><text x="16" y="18" fill="#64748b" font-size="9">CLI Path</text><rect width="12" height="12" x="55" y="8" fill="url(#sdkGradient)" rx="2"/><text x="71" y="18" fill="#64748b" font-size="9">SDK Path</text></g></svg>